<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <style>
      .btn > button {
         border: none;
         padding: 12px 20px;
         font-size: 18px;
         border-radius: 3px;
         background-color: rgb(81, 141, 179);
         color: white;
         cursor: pointer;
      }

      .result-container > p {
        font-size: 20px;
        display: block;
      }
    </style>
</head>
<body>
    <div class="btn">
     <button id="rock">Rock</button>
     <button id="paper">paper</button>
     <button id="scissors">Scissors</button>
    </div>
    <div class="result-container">
      
    </div>
   <script src="./script.js"></script> 
</body>
</html>
